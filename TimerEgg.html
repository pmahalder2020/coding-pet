<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Coding Pet — Your Digital Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0c1d;
    --bg2: #13122a;
    --bg3: #1a1836;
    --card: #1e1c38;
    --card2: #252342;
    --accent: #6d5ef5;
    --accent2: #9b87ff;
    --accent3: #c4b8ff;
    --gold: #fbbf24;
    --success: #34d399;
    --text: #f0eeff;
    --muted: #9490b8;
    --border: rgba(150,140,255,0.12);
    --border2: rgba(150,140,255,0.22);
    --radius: 16px;
    --radius-sm: 10px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* animated bg grid */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(109,94,245,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(109,94,245,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .glow-orb {
    position: fixed; border-radius: 50%;
    filter: blur(80px); opacity: 0.18; pointer-events: none; z-index: 0;
  }
  .orb1 { width: 400px; height: 400px; background: #6d5ef5; top: -100px; left: -100px; }
  .orb2 { width: 300px; height: 300px; background: #9b87ff; bottom: -80px; right: -80px; }

  .wrapper {
    position: relative; z-index: 1;
    max-width: 560px; margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  /* header */
  .app-header {
    text-align: center;
    margin-bottom: 2rem;
    animation: fadeUp 0.6s ease both;
  }
  .app-header h1 {
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent2); font-family: 'Space Mono', monospace;
    margin-bottom: 4px;
  }
  .app-header p {
    font-size: 11px; color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  /* cards */
  .card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }
  .card:nth-child(2) { animation-delay: 0.05s; }
  .card:nth-child(3) { animation-delay: 0.1s; }
  .card:nth-child(4) { animation-delay: 0.15s; }
  .card:nth-child(5) { animation-delay: 0.2s; }

  /* pet header strip */
  .pet-strip {
    background: linear-gradient(135deg, #3d2fa0 0%, #6d5ef5 50%, #9b87ff 100%);
    padding: 1.25rem 1.5rem 1rem;
    display: flex; align-items: center; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  .pet-strip::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 20px,
      rgba(255,255,255,0.015) 20px, rgba(255,255,255,0.015) 40px
    );
  }
  .strip-left { position: relative; z-index: 1; }
  .strip-label { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; color: rgba(255,255,255,0.6); text-transform: uppercase; font-family: 'Space Mono', monospace; }
  .strip-name { font-size: 26px; font-weight: 800; color: #fff; margin-top: 2px; letter-spacing: -0.01em; }
  .strip-badge {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.15);
    border: 0.5px solid rgba(255,255,255,0.25);
    color: #fff; padding: 5px 12px;
    border-radius: 30px; font-size: 11px;
    font-family: 'Space Mono', monospace; white-space: nowrap;
  }

  /* pet arena */
  .pet-arena {
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1rem 1.25rem;
  }
  #pet-svg { width: 150px; height: 150px; }

  .speech-bubble {
    margin-top: 14px;
    background: var(--card2);
    border: 0.5px solid var(--border2);
    border-radius: 14px;
    padding: 10px 16px;
    font-size: 13px; color: var(--muted);
    font-family: 'Space Mono', monospace;
    text-align: center; max-width: 300px;
    position: relative;
    transition: opacity 0.3s;
  }
  .speech-bubble::before {
    content: '';
    position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    border: 8px solid transparent;
    border-bottom: 8px solid var(--border2); border-top: none;
  }
  .speech-bubble::after {
    content: '';
    position: absolute; top: -6.5px; left: 50%; transform: translateX(-50%);
    border: 7px solid transparent;
    border-bottom: 7px solid var(--card2); border-top: none;
  }

  /* xp bar */
  .xp-wrap { padding: 0 1.25rem 1rem; }
  .xp-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 6px; font-family: 'Space Mono', monospace; }
  .xp-track { height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; border: 0.5px solid var(--border); }
  .xp-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.7s cubic-bezier(0.34,1.56,0.64,1); }

  /* stats row */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 1.25rem 1.25rem; }
  .stat {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 10px; text-align: center;
  }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--text); font-family: 'Space Mono', monospace; }
  .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }

  /* section cards */
  .section-inner { padding: 1.25rem; }
  .section-title {
    font-size: 11px; font-weight: 600; color: var(--accent2);
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 14px; font-family: 'Space Mono', monospace;
  }

  /* slider */
  .slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .slider-row label { font-size: 12px; color: var(--muted); min-width: 54px; font-family: 'Space Mono', monospace; }
  .slider-row input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; background: var(--bg2);
    border-radius: 2px; outline: none;
    border: 0.5px solid var(--border);
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: var(--accent2);
    cursor: pointer; border: 2px solid var(--bg);
    box-shadow: 0 0 0 3px rgba(155,135,255,0.2);
  }
  .slider-val { font-size: 18px; font-weight: 700; color: var(--text); min-width: 36px; text-align: right; font-family: 'Space Mono', monospace; }

  /* buttons */
  .btn {
    display: inline-block; width: 100%;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff; border: none; border-radius: var(--radius-sm);
    padding: 12px 20px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: 'Syne', sans-serif;
    letter-spacing: 0.02em; transition: opacity 0.15s, transform 0.1s;
    position: relative; overflow: hidden;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(rgba(255,255,255,0.08), transparent);
    pointer-events: none;
  }

  /* tasks */
  .tasks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .task-chip {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    display: flex; align-items: center; gap: 9px;
    cursor: pointer; font-size: 13px; color: var(--muted);
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    font-family: 'Syne', sans-serif; user-select: none;
  }
  .task-chip:hover { background: var(--card2); border-color: var(--border2); color: var(--text); }
  .task-chip.done { background: rgba(109,94,245,0.15); border-color: rgba(109,94,245,0.45); color: var(--accent3); }
  .task-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1.5px solid var(--border2); flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }
  .task-chip.done .task-dot { background: var(--accent); border-color: var(--accent); }
  .task-xp { font-size: 10px; color: var(--accent2); margin-left: auto; font-family: 'Space Mono', monospace; white-space: nowrap; }

  /* history */
  .hist-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 0.5px solid var(--border);
  }
  .hist-item:last-child { border-bottom: none; }
  .hist-label { font-size: 13px; color: var(--text); }
  .hist-time { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 2px; }
  .hist-xp { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--accent2); font-weight: 700; }
  .hist-empty { font-size: 13px; color: var(--muted); font-family: 'Space Mono', monospace; }

  /* reset */
  .reset-btn {
    background: none; border: 0.5px solid var(--border);
    color: var(--muted); border-radius: var(--radius-sm);
    padding: 10px 16px; font-size: 12px; cursor: pointer;
    font-family: 'Space Mono', monospace; width: 100%;
    transition: border-color 0.15s, color 0.15s;
  }
  .reset-btn:hover { border-color: #ef4444; color: #ef4444; }

  /* toast */
  #toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-100px);
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; padding: 12px 28px; border-radius: 40px;
    font-size: 14px; font-weight: 700; font-family: 'Syne', sans-serif;
    box-shadow: 0 8px 32px rgba(109,94,245,0.4);
    transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 9999; pointer-events: none; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>
<div id="toast">Level up!</div>

<div class="wrapper">
  <div class="app-header">
    <h1>Coding Pet</h1>
    <p>grows with your grind</p>
  </div>

  <!-- Pet card -->
  <div class="card" style="animation-delay:0s">
    <div class="pet-strip">
      <div class="strip-left">
        <div class="strip-label">Your companion</div>
        <div class="strip-name" id="stage-name">Bit</div>
      </div>
      <div class="strip-badge" id="stage-badge">Level 1 · Egg</div>
    </div>
    <div class="pet-arena">
      <svg id="pet-svg" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="speech-bubble" id="pet-quote">Just hatched! Feed me some code!</div>
    </div>
    <div class="xp-wrap">
      <div class="xp-meta"><span>Progress</span><span id="xp-label">0 / 100 XP</span></div>
      <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="stat-level">1</div><div class="stat-lbl">Level</div></div>
      <div class="stat"><div class="stat-val" id="stat-hours">0h</div><div class="stat-lbl">Coded</div></div>
      <div class="stat"><div class="stat-val" id="stat-streak">0</div><div class="stat-lbl">Streak</div></div>
    </div>
  </div>

  <!-- Time log -->
  <div class="card" style="animation-delay:0.06s">
    <div class="section-inner">
      <div class="section-title">Log coding time</div>
      <div class="slider-row">
        <label>Minutes</label>
        <input type="range" id="time-slider" min="5" max="180" value="30" step="5" oninput="document.getElementById('time-val').textContent=this.value">
        <div class="slider-val" id="time-val">30</div>
      </div>
      <button class="btn" onclick="logTime()">+ Log session</button>
    </div>
  </div>

  <!-- Tasks -->
  <div class="card" style="animation-delay:0.12s">
    <div class="section-inner">
      <div class="section-title">Tasks completed today</div>
      <div class="tasks-grid" id="tasks-grid"></div>
      <button class="btn" onclick="submitTasks()">Submit tasks</button>
    </div>
  </div>

  <!-- History -->
  <div class="card" style="animation-delay:0.18s">
    <div class="section-inner">
      <div class="section-title">Session history</div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- Reset -->
  <div class="card" style="animation-delay:0.24s">
    <div class="section-inner">
      <div class="section-title">Danger zone</div>
      <button class="reset-btn" onclick="resetPet()">Reset pet progress</button>
    </div>
  </div>
</div>

<script>
const TASKS = [
  { id:'algo',    label:'Solved an algorithm', xp:20 },
  { id:'bug',     label:'Fixed a bug',         xp:12 },
  { id:'feature', label:'Built a feature',     xp:18 },
  { id:'review',  label:'Code review',         xp:10 },
  { id:'test',    label:'Wrote tests',         xp:15 },
  { id:'learn',   label:'Learned something',  xp:14 },
  { id:'problem', label:'Practice problem',   xp:16 },
  { id:'doc',     label:'Wrote docs',         xp:9  },
];

const STAGES = [
  { min:0,    max:100,  name:'Bit',     label:'Level 1 · Egg',     mood:'egg'     },
  { min:100,  max:250,  name:'Nibble',  label:'Level 2 · Larva',   mood:'baby'    },
  { min:250,  max:500,  name:'Byte',    label:'Level 3 · Sprite',  mood:'sprite'  },
  { min:500,  max:900,  name:'Compile', label:'Level 4 · Warrior', mood:'warrior' },
  { min:900,  max:1500, name:'Runtime', label:'Level 5 · Legend',  mood:'legend'  },
  { min:1500, max:99999,name:'Deploy',  label:'Level 6 · Deity',   mood:'deity'   },
];

const QUOTES = {
  egg:     ["Just hatched! Feed me some code!", "I'm hungry for commits...", "One session and I'll grow!"],
  baby:    ["Growing up! Keep coding!", "I love when you solve problems!", "You're my favourite human."],
  sprite:  ["Look at me now! Keep grinding.", "I can read Python now!", "Streak streak streak!"],
  warrior: ["We are unstoppable.", "I can sense a bug from miles away.", "Algorithms are my cardio."],
  legend:  ["I have transcended syntax.", "Deploy me.", "You have achieved greatness."],
  deity:   ["I am one with the cloud.", "Beyond level. Beyond limits.", "git push --force. JK."],
};

let state, tasksDone = {};

function loadState() {
  try { return JSON.parse(localStorage.getItem('coding_pet_v2') || 'null') || freshState(); }
  catch { return freshState(); }
}
function freshState() { return { xp:0, totalMins:0, streak:0, lastDay:'', sessions:[] }; }
function saveState() {
  try { localStorage.setItem('coding_pet_v2', JSON.stringify(state)); } catch {}
}
function getStage(xp) { return STAGES.find(s => xp >= s.min && xp < s.max) || STAGES[STAGES.length-1]; }

function logTime() {
  const mins = parseInt(document.getElementById('time-slider').value);
  const xp = Math.round(mins * 0.6);
  addXP(xp, `Coded ${mins} min`, xp);
  state.totalMins += mins;
  saveState();
}

function submitTasks() {
  const done = TASKS.filter(t => tasksDone[t.id]);
  if (!done.length) { showToast('Pick at least one task!'); return; }
  const xp = done.reduce((a,t) => a+t.xp, 0);
  const label = done.length === 1 ? done[0].label : `${done.length} tasks done`;
  addXP(xp, label, xp);
  tasksDone = {};
  renderTasks();
}

function addXP(amount, label, xp) {
  const prevStage = getStage(state.xp);
  state.xp += amount;
  updateStreak();
  state.sessions.unshift({ label, xp, t: Date.now() });
  if (state.sessions.length > 30) state.sessions.pop();
  saveState();
  const newStage = getStage(state.xp);
  if (newStage !== prevStage) showToast(`Level up! You're now ${newStage.name}!`);
  else showToast(`+${xp} XP!`);
  render();
}

function updateStreak() {
  const today = new Date().toDateString();
  if (state.lastDay === today) return;
  const yesterday = new Date(Date.now()-86400000).toDateString();
  state.streak = state.lastDay === yesterday ? state.streak+1 : 1;
  state.lastDay = today;
}

function resetPet() {
  if (!confirm('Reset all progress? Your pet will go back to an egg.')) return;
  state = freshState(); saveState(); tasksDone = {}; renderTasks(); render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function renderTasks() {
  document.getElementById('tasks-grid').innerHTML = TASKS.map(t => `
    <div class="task-chip${tasksDone[t.id]?' done':''}" onclick="toggleTask('${t.id}')">
      <div class="task-dot"></div>
      <span>${t.label}</span>
      <span class="task-xp">+${t.xp}</span>
    </div>`).join('');
}

function toggleTask(id) { tasksDone[id] = !tasksDone[id]; renderTasks(); }

function render() {
  const stage = getStage(state.xp);
  const idx = STAGES.indexOf(stage);
  const next = STAGES[idx+1];
  const inStage = state.xp - stage.min;
  const needed = (next ? next.min : stage.max) - stage.min;
  const pct = Math.min(100, Math.round((inStage/needed)*100));

  document.getElementById('stage-name').textContent = stage.name;
  document.getElementById('stage-badge').textContent = stage.label;
  document.getElementById('xp-fill').style.width = pct+'%';
  document.getElementById('xp-label').textContent = next ? `${state.xp} / ${next.min} XP` : `${state.xp} XP (maxed!)`;
  document.getElementById('stat-level').textContent = idx+1;
  document.getElementById('stat-hours').textContent = (Math.round(state.totalMins/60*10)/10)+'h';
  document.getElementById('stat-streak').textContent = state.streak;

  const qs = QUOTES[stage.mood]||QUOTES.egg;
  document.getElementById('pet-quote').textContent = qs[Math.floor(Math.random()*qs.length)];

  drawPet(stage.mood);
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!state.sessions.length) { el.innerHTML = '<div class="hist-empty">No sessions yet.</div>'; return; }
  el.innerHTML = state.sessions.slice(0,10).map(s => {
    const d = new Date(s.t);
    const time = d.toLocaleDateString('en-IN',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    return `<div class="hist-item">
      <div><div class="hist-label">${s.label}</div><div class="hist-time">${time}</div></div>
      <div class="hist-xp">+${s.xp} XP</div>
    </div>`;
  }).join('');
}

function drawPet(mood) {
  const svg = document.getElementById('pet-svg');
  const pulse = `<animateTransform attributeName="transform" type="scale" values="1;1.04;1" dur="2.2s" repeatCount="indefinite" additive="sum"/>`;
  const blink = `<animate attributeName="ry" values="5;0.5;5" dur="3.5s" repeatCount="indefinite"/>`;

  const pets = {
    egg: `
      <ellipse cx="70" cy="84" rx="33" ry="38" fill="#2a2060" stroke="#6d5ef5" stroke-width="1.5"/>
      <ellipse cx="70" cy="84" rx="33" ry="38" fill="none" stroke="#9b87ff" stroke-width="0.5" opacity="0.4"/>
      <ellipse cx="57" cy="76" rx="5" ry="5" fill="#c4b8ff" opacity="0.9">${blink}</ellipse>
      <ellipse cx="83" cy="76" rx="5" ry="5" fill="#c4b8ff" opacity="0.9">${blink}</ellipse>
      <path d="M63 92 Q70 100 77 92" stroke="#9b87ff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <g>${pulse}</g>`,
    baby: `
      <ellipse cx="70" cy="82" rx="29" ry="31" fill="#2a2060" stroke="#7c6cf5" stroke-width="1.5">${pulse}</ellipse>
      <ellipse cx="57" cy="74" rx="6" ry="6" fill="#c4b8ff" opacity="0.92">${blink}</ellipse>
      <ellipse cx="83" cy="74" rx="6" ry="6" fill="#c4b8ff" opacity="0.92">${blink}</ellipse>
      <path d="M61 90 Q70 99 79 90" stroke="#9b87ff" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <ellipse cx="47" cy="90" rx="11" ry="8" fill="#1e1c38" stroke="#6d5ef5" stroke-width="1"/>
      <ellipse cx="93" cy="90" rx="11" ry="8" fill="#1e1c38" stroke="#6d5ef5" stroke-width="1"/>`,
    sprite: `
      <ellipse cx="70" cy="80" rx="27" ry="27" fill="#3b2da0" stroke="#7c6cf5" stroke-width="1.5">${pulse}</ellipse>
      <ellipse cx="57" cy="72" rx="7" ry="7" fill="#e0d8ff" opacity="0.95">${blink}</ellipse>
      <ellipse cx="83" cy="72" rx="7" ry="7" fill="#e0d8ff" opacity="0.95">${blink}</ellipse>
      <ellipse cx="59" cy="70" rx="3" ry="2.5" fill="#3b2da0" opacity="0.8"/>
      <ellipse cx="85" cy="70" rx="3" ry="2.5" fill="#3b2da0" opacity="0.8"/>
      <path d="M60 88 Q70 98 80 88" stroke="#c4b8ff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <line x1="70" y1="53" x2="70" y2="38" stroke="#9b87ff" stroke-width="2"/>
      <circle cx="70" cy="35" r="6" fill="#6d5ef5" stroke="#c4b8ff" stroke-width="1"/>
